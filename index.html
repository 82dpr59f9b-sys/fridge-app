<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="冷蔵庫">
<title>冷蔵庫在庫</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: #f4f2ec;
    color: #2c2c2a;
    padding: env(safe-area-inset-top) 16px calc(24px + env(safe-area-inset-bottom));
    max-width: 520px;
    margin: 0 auto;
  }
  header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 20px 4px 14px;
  }
  h1 { font-size: 20px; font-weight: 600; }
  #count { font-size: 13px; color: #807e75; }

  .presets { margin-bottom: 14px; }
  .presets p { font-size: 12px; color: #807e75; margin: 0 4px 8px; }
  .preset-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .preset-row button {
    font-size: 14px; padding: 9px 14px; border-radius: 999px;
    border: 1px solid #d8d5ca; background: #fff; color: #2c2c2a;
    cursor: pointer;
  }
  .preset-row button:active { background: #ece9df; }

  form {
    display: flex; gap: 8px; margin-bottom: 18px;
  }
  input[type="text"] {
    flex: 1; min-width: 0; font-size: 16px; padding: 10px 12px;
    border: 1px solid #d8d5ca; border-radius: 10px; background: #fff;
  }
  input[type="date"] {
    font-size: 15px; padding: 8px 8px; border: 1px solid #d8d5ca;
    border-radius: 10px; background: #fff; color: #2c2c2a; width: 128px;
  }
  form button {
    font-size: 15px; font-weight: 600; padding: 10px 14px;
    border: none; border-radius: 10px; background: #2c2c2a; color: #fff;
    cursor: pointer; flex-shrink: 0;
  }

  #list { display: flex; flex-direction: column; gap: 8px; }
  .item {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 1px solid #e3e0d6; border-radius: 12px;
    padding: 12px 14px;
  }
  .item.warn { background: #fdf3e0; border-color: #f0d9a8; }
  .item.danger { background: #fdeaea; border-color: #f0bcbc; }
  .item .info { flex: 1; min-width: 0; }
  .item .name { font-size: 16px; font-weight: 600; }
  .item .due { font-size: 13px; color: #807e75; margin-top: 2px; }
  .item.warn .due { color: #9a6a10; font-weight: 600; }
  .item.danger .name { color: #8c2222; }
  .item.danger .due { color: #b03030; font-weight: 600; }
  .item .done {
    font-size: 13px; padding: 8px 12px; border-radius: 999px;
    border: 1px solid #d8d5ca; background: transparent; color: #5f5e5a;
    cursor: pointer; flex-shrink: 0;
  }
  .item .done:active { background: #ece9df; }

  #empty { text-align: center; color: #a09e94; font-size: 14px; padding: 48px 0; }

  footer { margin-top: 28px; text-align: center; }
  footer button {
    font-size: 12px; color: #807e75; background: none; border: none;
    text-decoration: underline; cursor: pointer; margin: 0 10px; padding: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>うちの冷蔵庫</h1>
  <div style="text-align: right;">
    <span id="count"></span>
    <div id="sync" style="font-size: 11px; color: #807e75;"></div>
  </div>
</header>

<div class="presets">
  <p>ワンタップ登録(いつものを買った)</p>
  <div class="preset-row" id="presetRow"></div>
</div>

<form id="addForm">
  <input type="text" id="nameInput" placeholder="食材名" autocomplete="off">
  <input type="date" id="dateInput">
  <button type="submit">追加</button>
</form>

<div id="list"></div>
<p id="empty" hidden>冷蔵庫は空っぽです。<br>上のボタンか入力欄から追加してください。</p>

<footer>
  <button id="exportBtn">バックアップを書き出す</button>
  <button id="importBtn">読み込む</button>
  <button id="shareBtn">共有設定</button>
  <input type="file" id="importFile" accept=".json" hidden>
</footer>

<script>
const KEY = 'fridge_v1';
const PRESETS = [
  ['卵', 14], ['納豆', 10], ['豆腐', 5], ['食パン', 4],
  ['ヨーグルト', 14], ['もやし', 2],
];

let items = [];
try { items = JSON.parse(localStorage.getItem(KEY)) || []; } catch (e) {}

const GIST_ID = 'f4e73a51bda71d81ba54d3d554a63ead';
const GIST_FILE = 'fridge-data.json';
const TOKEN_KEY = 'fridge_token';
const DIRTY_KEY = 'fridge_dirty';
const SYNCED_KEY = 'fridge_synced';
const getToken = () => localStorage.getItem(TOKEN_KEY) || '';
const isDirty = () => !!localStorage.getItem(DIRTY_KEY);

let pushPending = false;
let pushTimer = null;

const setSync = (msg, isErr) => {
  const el = document.getElementById('sync');
  el.textContent = msg;
  el.style.color = isErr ? '#b03030' : '#807e75';
};

async function gistFetch(method, body) {
  const headers = { 'Accept': 'application/vnd.github+json' };
  if (getToken()) headers['Authorization'] = 'Bearer ' + getToken();
  const res = await fetch('https://api.github.com/gists/' + GIST_ID, {
    method,
    headers,
    body: body ? JSON.stringify(body) : undefined,
    keepalive: true,
  });
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function pushRemote() {
  if (!getToken()) return;
  pushPending = false;
  clearTimeout(pushTimer);
  try {
    setSync('同期中…');
    await gistFetch('PATCH', { files: { [GIST_FILE]: { content: JSON.stringify(items) } } });
    localStorage.removeItem(DIRTY_KEY);
    localStorage.setItem(SYNCED_KEY, '1');
    setSync('同期済み ' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
  } catch (e) {
    setSync('同期エラー(' + e.message + ')', true);
  }
}

function schedulePush() {
  if (!getToken()) return;
  pushPending = true;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushRemote, 300);
}

async function pullRemote() {
  if (!getToken()) return;
  if (pushPending || isDirty()) { pushRemote(); return; }
  try {
    setSync('同期中…');
    const g = await gistFetch('GET');
    const remote = JSON.parse(g.files[GIST_FILE].content);
    if (!Array.isArray(remote)) throw new Error('データ形式が不正');
    if (remote.length === 0 && items.length > 0 && !localStorage.getItem(SYNCED_KEY)) {
      await pushRemote();
    } else {
      items = remote;
      localStorage.setItem(KEY, JSON.stringify(items));
      localStorage.setItem(SYNCED_KEY, '1');
      render();
      setSync('同期済み ' + new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }));
    }
  } catch (e) {
    setSync('同期エラー(' + e.message + ')', true);
  }
}

const save = () => {
  localStorage.setItem(KEY, JSON.stringify(items));
  if (getToken()) localStorage.setItem(DIRTY_KEY, '1');
  schedulePush();
};
const todayStr = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const addDays = (n) => {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
};
const daysLeft = (dateStr) => {
  const t = new Date(todayStr());
  const e = new Date(dateStr);
  return Math.round((e - t) / 86400000);
};

function addItem(name, expiry) {
  if (!name.trim()) return;
  items.push({ id: Date.now() + Math.random(), name: name.trim(), expiry });
  save();
  render();
}

function render() {
  items.sort((a, b) => a.expiry.localeCompare(b.expiry));
  const list = document.getElementById('list');
  list.innerHTML = '';
  document.getElementById('empty').hidden = items.length > 0;
  document.getElementById('count').textContent = items.length ? `${items.length}品目` : '';

  for (const it of items) {
    const n = daysLeft(it.expiry);
    let cls = '', label;
    if (n < 0) { cls = 'danger'; label = `期限切れ(${-n}日前)`; }
    else if (n === 0) { cls = 'danger'; label = '今日まで'; }
    else if (n <= 3) { cls = 'warn'; label = `あと${n}日`; }
    else { label = `あと${n}日(${it.expiry.slice(5).replace('-', '/')})`; }

    const row = document.createElement('div');
    row.className = 'item ' + cls;
    const info = document.createElement('div');
    info.className = 'info';
    const nm = document.createElement('div');
    nm.className = 'name';
    nm.textContent = it.name;
    const due = document.createElement('div');
    due.className = 'due';
    due.textContent = label;
    info.append(nm, due);
    const btn = document.createElement('button');
    btn.className = 'done';
    btn.textContent = '使い切った';
    btn.onclick = () => {
      items = items.filter(x => x.id !== it.id);
      save();
      render();
    };
    row.append(info, btn);
    list.append(row);
  }
}

const presetRow = document.getElementById('presetRow');
for (const [name, days] of PRESETS) {
  const b = document.createElement('button');
  b.textContent = '+ ' + name;
  b.onclick = () => addItem(name, addDays(days));
  presetRow.append(b);
}

document.getElementById('dateInput').value = addDays(5);
document.getElementById('addForm').onsubmit = (e) => {
  e.preventDefault();
  const name = document.getElementById('nameInput');
  const date = document.getElementById('dateInput');
  if (!date.value) return;
  addItem(name.value, date.value);
  name.value = '';
  name.focus();
};

document.getElementById('exportBtn').onclick = () => {
  const blob = new Blob([JSON.stringify(items, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `冷蔵庫バックアップ_${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};
document.getElementById('importBtn').onclick = () => document.getElementById('importFile').click();
document.getElementById('importFile').onchange = (e) => {
  const f = e.target.files[0];
  if (!f) return;
  f.text().then(t => {
    const data = JSON.parse(t);
    if (Array.isArray(data)) { items = data; save(); render(); }
  }).catch(() => alert('読み込めませんでした'));
  e.target.value = '';
};

document.getElementById('shareBtn').onclick = () => {
  const t = prompt('共有用の合言葉(GitHubトークン)を入力してください。\n空のままOKすると共有をオフにします。', getToken());
  if (t === null) return;
  if (t.trim()) {
    localStorage.setItem(TOKEN_KEY, t.trim());
    pullRemote();
  } else {
    localStorage.removeItem(TOKEN_KEY);
    setSync('共有オフ');
  }
};

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') pullRemote();
  else if (pushPending || isDirty()) pushRemote();
});
window.addEventListener('pagehide', () => {
  if (pushPending || isDirty()) pushRemote();
});

render();
if (getToken()) pullRemote();
else setSync('共有未設定');
</script>
</body>
</html>
